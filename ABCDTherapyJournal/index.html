<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Therapy Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;1,400&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f0eb;--surface:#ede7df;--card:#faf7f4;--border:#ddd5ca;--accent:#8b7355;--accent2:#6b5b45;--accent-light:#c4a882;--text:#3d342a;--muted:#9e8e7e;--danger:#c0614a;--warning:#b8853a;--highlight:#e8ddd0;--radius:16px;--sage:#7a8f7a;--olive:#7a8c3a;--olive-light:#e8edda;--olive-muted:#b5c28a;--blush:#c48b7a;--sky:#7a9aaa}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Georgia,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 80px}
header{background:linear-gradient(135deg,#e8ddd0,#ddd0c0);border-bottom:1px solid var(--border);padding:18px 20px 14px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}

  .logo-icon{width:44px;height:44px;background:#6b5b45;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .logo-text{display:flex;align-items:baseline;gap:6px}
  .logo-text .w1{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:#3d342a;line-height:1}
  .logo-text .w2{font-family:'Fraunces',serif;font-size:22px;font-style:italic;font-weight:400;color:#c4a882;line-height:1}

  .header-left h1-DISABLED{font-size:18px;font-weight:700;color:var(--accent2)}.header-left p{font-size:12px;color:var(--muted);margin-top:2px}
.btn-export{background:var(--accent2);color:#faf7f4;border:none;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
.container{padding:16px;max-width:640px;margin:0 auto}
.date-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;background:var(--card);border-radius:var(--radius);padding:12px 16px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(139,115,85,.07)}
.date-bar label{font-size:11px;color:var(--olive);white-space:nowrap;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.date-bar input[type=date]{background:transparent;border:none;color:var(--accent2);font-size:14px;font-weight:600;flex:1;outline:none;cursor:pointer;font-family:inherit}
.date-bar input[type=date]::-webkit-calendar-picker-indicator{filter:invert(40%) sepia(20%) saturate(500%) hue-rotate(10deg)}
.entry-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;box-shadow:0 2px 10px rgba(139,115,85,.08)}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:linear-gradient(135deg,#ede7df,#e8ddd0);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.card-header-left{display:flex;align-items:center;gap:8px}
.entry-num{background:var(--olive);color:#faf7f4;width:24px;height:24px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.card-header h3{font-size:13px;font-weight:700;color:var(--accent2)}.card-time{font-size:11px;color:var(--muted)}
.collapse-icon{color:var(--muted);font-size:14px;transition:transform .25s}
.entry-card.collapsed .collapse-icon{transform:rotate(-90deg)}
.card-body{padding:16px}.entry-card.collapsed .card-body{display:none}
.field{margin-bottom:16px}
.field label{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.6px}
.field-badge{width:20px;height:20px;border-radius:7px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.badge-a{background:#ddeaf0;color:var(--sky)}.badge-b{background:#ede0f0;color:#9a6fb0}
.badge-c{background:#f5e0dd;color:var(--blush)}.badge-d{background:var(--olive-light);color:var(--olive)}
textarea{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:11px;color:var(--text);padding:11px 13px;font-size:14px;line-height:1.6;resize:vertical;outline:none;min-height:82px;font-family:inherit;transition:border-color .2s}
textarea:focus{border-color:var(--olive-muted);background:#fdfaf7}
textarea::placeholder{color:#b8a898;font-size:13px}
.rating-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px}
.rating-label{font-size:12px;color:var(--muted);white-space:nowrap;font-weight:500}
.rating-dots{display:flex;gap:6px;flex-wrap:wrap}
.dot{width:30px;height:30px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;user-select:none}
.dot:hover{border-color:var(--accent-light);color:var(--accent);background:#f0e8de}
.dot.selected{background:var(--accent);border-color:var(--accent);color:#faf7f4}
.dot[data-val="8"].selected,.dot[data-val="9"].selected,.dot[data-val="10"].selected{background:var(--blush);border-color:var(--blush);color:#fff}
.dot[data-val="4"].selected,.dot[data-val="5"].selected,.dot[data-val="6"].selected,.dot[data-val="7"].selected{background:var(--warning);border-color:var(--warning);color:#fff}
.dot[data-val="1"].selected,.dot[data-val="2"].selected,.dot[data-val="3"].selected{background:var(--sage);border-color:var(--sage);color:#fff}
.dot[data-val="0"].selected{background:var(--muted);border-color:var(--muted);color:#fff}
.card-actions{display:flex;justify-content:flex-end;gap:8px;padding:0 16px 16px}
.btn-save{background:var(--accent2);color:#faf7f4;border:none;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer}
.btn-discard{background:transparent;color:var(--danger);border:1.5px solid #e0b8b0;padding:10px 13px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
.btn-discard:hover{background:#faeae7}
.add-btn{width:100%;padding:15px;border-radius:var(--radius);background:transparent;border:2px dashed var(--olive-muted);color:var(--olive);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;margin-bottom:4px}
.add-btn:hover{border-color:var(--olive-muted);background:var(--olive-light)}
.entries-section{margin-top:22px}
.section-title{font-size:11px;font-weight:700;color:var(--olive);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.saved-entry-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:0 1px 6px rgba(139,115,85,.06)}
.saved-header{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;background:linear-gradient(135deg,#ede7df,#e8ddd0);border-bottom:1px solid var(--border);cursor:pointer}
.saved-header-left{display:flex;align-items:center;gap:8px}
.saved-num{font-size:12px;font-weight:700;color:var(--accent2)}.saved-time{font-size:11px;color:var(--muted)}
.saved-preview{font-size:12px;color:var(--muted);max-width:50%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.saved-body{padding:13px 15px}.saved-body.hidden{display:none}
.saved-field{margin-bottom:11px}
.saved-field-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:5px;margin-bottom:4px}
.saved-field-content{font-size:13.5px;color:var(--text);line-height:1.6;background:var(--surface);border-radius:9px;padding:9px 12px;border:1px solid var(--border)}
.rating-chip{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700}
.chip-low{background:#dff0e4;color:var(--sage)}.chip-mid{background:#f5ead8;color:var(--warning)}
.chip-high{background:#f5e0dd;color:var(--blush)}.chip-zero{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
.saved-actions{display:flex;gap:8px;justify-content:flex-end;padding-top:8px}
.btn-edit{background:transparent;color:var(--accent2);border:1.5px solid var(--border);padding:7px 14px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer}
.btn-edit:hover{background:#f0e8de}
.btn-del-saved{background:transparent;color:var(--danger);border:1.5px solid #e0b8b0;padding:7px 10px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer}
.btn-del-saved:hover{background:#faeae7}
.empty-state{text-align:center;padding:30px;color:var(--muted);font-size:13px;background:var(--card);border-radius:var(--radius);border:1px dashed var(--border)}
.empty-state .emoji{font-size:28px;margin-bottom:8px}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--accent2);color:#faf7f4;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;height:64px;box-shadow:0 -2px 12px rgba(139,115,85,.08)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;transition:color .2s}
.nav-btn.active{color:var(--olive)}.nav-btn.active svg{color:var(--olive)}.nav-btn svg{width:20px;height:20px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(61,52,42,.5);z-index:200;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(61,52,42,.2)}
.modal-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#ede7df,#e8ddd0);border-radius:var(--radius) var(--radius) 0 0}
.modal-header h2{font-size:16px;font-weight:700;color:var(--accent2)}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
.modal-body{padding:16px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;background:var(--surface);border-radius:0 0 var(--radius) var(--radius)}
.btn-copy,.btn-csv{padding:9px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none}
.btn-copy{background:var(--accent2);color:#faf7f4}.btn-csv{background:var(--sage);color:#fff}
.export-table-wrap{overflow-x:auto}
table.export-tbl{border-collapse:collapse;width:100%;font-size:12px;min-width:520px}
table.export-tbl th{background:var(--highlight);color:var(--accent2);padding:9px 10px;text-align:left;border-bottom:1px solid var(--border);font-weight:700;font-size:11px;text-transform:uppercase;white-space:nowrap}
table.export-tbl td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:top;color:var(--text);max-width:160px;word-break:break-word;line-height:1.5}
table.export-tbl tr:hover td{background:var(--highlight)}
.view{display:none}.view.active{display:block}
.hist-date-group{margin-bottom:20px}
.hist-date-label{font-size:11px;font-weight:700;color:var(--olive);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.hist-date-label::after{content:'';flex:1;height:1px;background:var(--border)}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="logo-icon">
        <svg width="26" height="26" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 4C14 4 6 8 6 16C6 20.4 9.6 24 14 24C18.4 24 22 20.4 22 16C22 8 14 4 14 4Z" fill="#7a8c3a"/>
          <path d="M14 4C14 4 14 12 14 20" stroke="#faf7f4" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M10 13C10 13 12 14.5 14 14" stroke="#faf7f4" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="w1">Therapy</span>
        <span class="w2">Journal</span>
      </div>
    </div>
    <p id="headerDate"></p>
  </div>
  <button class="btn-export" onclick="openExportModal()">&#8681; Export</button>
</header>
<div id="view-log" class="view active container">
  <div class="date-bar">
    <label>Date</label>
    <input type="date" id="entryDate"/>
  </div>
  <div id="forms-container"></div>
  <button class="add-btn" onclick="addNewForm()">&#43; Add Another Entry</button>
  <div class="entries-section">
    <div class="section-title" id="todayLabel">Today's Saved Entries</div>
    <div id="todayEntriesList"></div>
  </div>
</div>
<div id="view-history" class="view container">
  <div class="section-title" style="margin-bottom:14px">All Entries</div>
  <div id="historyList"></div>
</div>
<div class="toast" id="toast"></div>
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-log" onclick="switchView('log')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2v-5m-6-1l6-6m0 0l-3-3m3 3l-3 3"/></svg>
    Log
  </button>
  <button class="nav-btn" id="nav-history" onclick="switchView('history')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    History
  </button>
</nav>
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Export Journal</h2>
      <button class="modal-close" onclick="closeExportModal()">&#10005;</button>
    </div>
    <div class="modal-body"><div class="export-table-wrap" id="exportTableContainer"></div></div>
    <div class="modal-footer">
      <button class="btn-csv" onclick="downloadCSV()">&#8681; Download CSV</button>
      <button class="btn-copy" onclick="copyTable()">Copy Table</button>
    </div>
  </div>
</div>
<script>

var SK = 'therapy_journal_v2';
var entries = JSON.parse(localStorage.getItem(SK) || '[]');
var fc = 0;

function save() { localStorage.setItem(SK, JSON.stringify(entries)); }

function todayStr() {
  var d = new Date();
  var mm = ('0'+(d.getMonth()+1)).slice(-2);
  var dd = ('0'+d.getDate()).slice(-2);
  return d.getFullYear()+'-'+mm+'-'+dd;
}

function fmtDate(s) {
  if (!s) return '';
  var p = s.split('-');
  var mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return parseInt(p[2])+' '+mo[parseInt(p[1])-1]+' '+p[0];
}

function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function chip(r) {
  r = r || 0;
  if (r === 0) return '<span class="rating-chip chip-zero">0/10</span>';
  if (r <= 3) return '<span class="rating-chip chip-low">'+r+'/10</span>';
  if (r <= 7) return '<span class="rating-chip chip-mid">'+r+'/10</span>';
  return '<span class="rating-chip chip-high">'+r+'/10</span>';
}

function addNewForm() {
  fc++;
  var id = 'f' + Date.now();
  var el = document.createElement('div');
  el.className = 'entry-card';
  el.id = id;
  el.setAttribute('data-rating','0');
  var t = fmtTime(Date.now());
  var n = fc;
  el.innerHTML =
    '<div class="card-header" onclick="toggleCard(\''+id+'\')">' +
      '<div class="card-header-left">' +
        '<div class="entry-num">'+n+'</div>' +
        '<h3>New Reflection</h3>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:8px">' +
        '<span class="card-time">'+t+'</span>' +
        '<span class="collapse-icon">&#9662;</span>' +
      '</div>' +
    '</div>' +
    '<div class="card-body">' +
      '<div class="field">' +
        '<label><span class="field-badge badge-a">A</span>Situation &ndash; What happened?</label>' +
        '<textarea id="'+id+'_a" placeholder="Describe the situation that triggered your thoughts&hellip;"></textarea>' +
      '</div>' +
      '<div class="field">' +
        '<label><span class="field-badge badge-b">B</span>Thoughts / Beliefs / Expectations</label>' +
        '<textarea id="'+id+'_b" placeholder="What thoughts or beliefs came up? What did you tell yourself?"></textarea>' +
      '</div>' +
      '<div class="field">' +
        '<label><span class="field-badge badge-c">C</span>Emotions / Behaviors</label>' +
        '<textarea id="'+id+'_c" rows="2" placeholder="What did you feel? How did you behave?"></textarea>' +
        '<div class="rating-row"><span class="rating-label">Negative intensity:</span><div class="rating-dots" id="'+id+'_dots"></div></div>' +
      '</div>' +
      '<div class="field" style="margin-bottom:0">' +
        '<label><span class="field-badge badge-d">D</span>Dispute / Debate</label>' +
        '<textarea id="'+id+'_d" placeholder="Challenge your negative thoughts. Is holding this belief helpful?"></textarea>' +
      '</div>' +
    '</div>' +
    '<div class="card-actions">' +
      '<button class="btn-discard" onclick="discardForm(\''+id+'\')">&#10005; Discard</button>' +
      '<button class="btn-save" onclick="saveEntry(\''+id+'\')">Save Entry</button>' +
    '</div>';
  document.getElementById('forms-container').appendChild(el);
  buildDots(id);
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function buildDots(id) {
  var c = document.getElementById(id+'_dots');
  for (var i=0; i<=10; i++) {
    (function(v){
      var d = document.createElement('div');
      d.className='dot'; d.setAttribute('data-val',v); d.textContent=v;
      d.onclick=function(){ selectDot(id,v); };
      c.appendChild(d);
    })(i);
  }
}

function selectDot(id, val) {
  document.getElementById(id).setAttribute('data-rating', val);
  var dots = document.querySelectorAll('#'+id+'_dots .dot');
  for (var i=0; i<dots.length; i++) {
    if (parseInt(dots[i].getAttribute('data-val'))===val) dots[i].classList.add('selected');
    else dots[i].classList.remove('selected');
  }
}

function toggleCard(id) { document.getElementById(id).classList.toggle('collapsed'); }
function discardForm(id) { document.getElementById(id).remove(); }

function saveEntry(id) {
  var a = document.getElementById(id+'_a').value.trim();
  var b = document.getElementById(id+'_b').value.trim();
  var c = document.getElementById(id+'_c').value.trim();
  var d = document.getElementById(id+'_d').value.trim();
  if (!a && !b && !c && !d) { toast('Please fill in at least one field'); return; }
  var r = parseInt(document.getElementById(id).getAttribute('data-rating')||0);
  var date = document.getElementById('entryDate').value;
  entries.push({id:'e'+Date.now(),date:date,ts:Date.now(),a:a,b:b,c:c,d:d,r:r});
  save();
  document.getElementById(id).remove();
  renderSaved();
  toast('Entry saved!');
  if(document.activeElement) document.activeElement.blur();
}

function renderSaved() {
  var date = document.getElementById('entryDate').value;
  document.getElementById('todayLabel').textContent = (date===todayStr()) ? "Today's Saved Entries" : "Entries for "+fmtDate(date);
  var list = document.getElementById('todayEntriesList');
  list.innerHTML = '';
  var filtered = [];
  for (var i=0; i<entries.length; i++) { if (entries[i].date===date) filtered.push(entries[i]); }
  filtered.sort(function(a,b){ return b.ts-a.ts; });
  if (!filtered.length) {
    list.innerHTML='<div class="empty-state"><div class="emoji">&#129504;</div>No saved entries yet.</div>';
    return;
  }
  for (var i=0; i<filtered.length; i++) buildSavedCard(list,filtered[i],filtered.length-i,false);
}

function sfHtml(letter,label,text,badge,r) {
  if (!text) return '';
  var rh = (r!==undefined) ? '<span style="margin-left:6px">'+chip(r)+'</span>' : '';
  return '<div class="saved-field">'+
    '<div class="saved-field-title"><span class="field-badge '+badge+'" style="width:16px;height:16px;font-size:9px">'+letter+'</span>'+label+rh+'</div>'+
    '<div class="saved-field-content">'+esc(text)+'</div>'+
    '</div>';
}

function buildSavedCard(container, e, idx, collapsed) {
  var el = document.createElement('div');
  el.className = 'saved-entry-card';
  var preview = e.a ? (e.a.length>45?e.a.substring(0,45)+'...':e.a) : '(no situation)';
  var bc = collapsed ? 'saved-body hidden' : 'saved-body';
  el.innerHTML =
    '<div class="saved-header" onclick="toggleBody(\'b'+e.id+'\')">' +
      '<div class="saved-header-left">' +
        '<span class="saved-num">Reflection '+idx+'</span>' +
        '<span class="saved-time">'+fmtTime(e.ts)+'</span>' +
        chip(e.r) +
      '</div>' +
      '<span class="saved-preview">'+esc(preview)+'</span>' +
    '</div>' +
    '<div class="'+bc+'" id="b'+e.id+'">' +
      sfHtml('A','Situation',e.a,'badge-a') +
      sfHtml('B','Thoughts/Beliefs',e.b,'badge-b') +
      sfHtml('C','Emotions/Behaviors',e.c,'badge-c',e.r) +
      sfHtml('D','Dispute/Debate',e.d,'badge-d') +
      '<div class="saved-actions">' +
        '<button class="btn-del-saved" onclick="delEntry(\''+e.id+'\')">Delete</button>' +
        '<button class="btn-edit" onclick="editEntry(\''+e.id+'\')">Edit</button>' +
      '</div>' +
    '</div>';
  container.appendChild(el);
}

function toggleBody(id) { document.getElementById(id).classList.toggle('hidden'); }

function delEntry(eid) {
  if (!confirm('Delete this entry?')) return;
  entries = entries.filter(function(e){ return e.id!==eid; });
  save(); renderSaved();
  if (document.getElementById('view-history').classList.contains('active')) renderHistory();
  toast('Entry deleted');
}

function editEntry(eid) {
  var found=null;
  for (var i=0;i<entries.length;i++) { if (entries[i].id===eid){found=entries[i];break;} }
  if (!found) return;
  entries = entries.filter(function(e){ return e.id!==eid; });
  save(); fc++;
  var id='fe'+eid;
  var el=document.createElement('div');
  el.className='entry-card'; el.id=id; el.setAttribute('data-rating',found.r||0);
  el.innerHTML=
    '<div class="card-header" onclick="toggleCard(\''+id+'\')">' +
      '<div class="card-header-left"><div class="entry-num" style="background:var(--warning)"></div><h3>Editing Reflection</h3></div>' +
      '<div style="display:flex;align-items:center;gap:8px"><span class="card-time">'+fmtTime(found.ts)+'</span><span class="collapse-icon">&#9662;</span></div>' +
    '</div>' +
    '<div class="card-body">' +
      '<div class="field"><label><span class="field-badge badge-a">A</span>Situation</label><textarea id="'+id+'_a">'+esc(found.a)+'</textarea></div>' +
      '<div class="field"><label><span class="field-badge badge-b">B</span>Thoughts / Beliefs</label><textarea id="'+id+'_b">'+esc(found.b)+'</textarea></div>' +
      '<div class="field"><label><span class="field-badge badge-c">C</span>Emotions / Behaviors</label><textarea id="'+id+'_c" rows="2">'+esc(found.c)+'</textarea>' +
        '<div class="rating-row"><span class="rating-label">Negative intensity:</span><div class="rating-dots" id="'+id+'_dots"></div></div></div>' +
      '<div class="field" style="margin-bottom:0"><label><span class="field-badge badge-d">D</span>Dispute / Debate</label><textarea id="'+id+'_d">'+esc(found.d)+'</textarea></div>' +
    '</div>' +
    '<div class="card-actions">' +
      '<button class="btn-discard" onclick="discardForm(\''+id+'\')">&#10005; Cancel</button>' +
      '<button class="btn-save" onclick="saveEdit(\''+id+'\','+found.ts+')">Update</button>' +
    '</div>';
  document.getElementById('forms-container').prepend(el);
  buildDots(id); selectDot(id,found.r||0);
  document.getElementById('entryDate').value=found.date;
  renderSaved(); el.scrollIntoView({behavior:'smooth',block:'start'});
}

function saveEdit(id,origTs) {
  var a=document.getElementById(id+'_a').value.trim();
  var b=document.getElementById(id+'_b').value.trim();
  var c=document.getElementById(id+'_c').value.trim();
  var d=document.getElementById(id+'_d').value.trim();
  var r=parseInt(document.getElementById(id).getAttribute('data-rating')||0);
  var date=document.getElementById('entryDate').value;
  entries.push({id:'e'+Date.now(),date:date,ts:origTs,a:a,b:b,c:c,d:d,r:r});
  save(); document.getElementById(id).remove(); renderSaved();
  if (document.getElementById('view-history').classList.contains('active')) renderHistory();
  toast('Entry updated!');
}

function renderHistory() {
  var list=document.getElementById('historyList');
  list.innerHTML='';
  if (!entries.length) { list.innerHTML='<div class="empty-state"><div class="emoji">&#129504;</div>No entries yet.</div>'; return; }
  var sorted=entries.slice().sort(function(a,b){ return b.ts-a.ts; });
  var groups={}, dates=[];
  for (var i=0;i<sorted.length;i++) {
    var e=sorted[i];
    if (!groups[e.date]){groups[e.date]=[];dates.push(e.date);}
    groups[e.date].push(e);
  }
  dates.sort(function(a,b){ return b.localeCompare(a); });
  for (var di=0;di<dates.length;di++) {
    var date=dates[di];
    var grp=groups[date].sort(function(a,b){ return b.ts-a.ts; });
    var g=document.createElement('div');
    g.className='hist-date-group';
    g.innerHTML='<div class="hist-date-label">'+fmtDate(date)+' &middot; '+grp.length+' entr'+(grp.length===1?'y':'ies')+'</div>';
    for (var gi=0;gi<grp.length;gi++) buildSavedCard(g,grp[gi],grp.length-gi,false);
    list.appendChild(g);
  }
}

function switchView(v) {
  document.querySelectorAll('.view').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(el){el.classList.remove('active');});
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('nav-'+v).classList.add('active');
  if (v==='history') renderHistory();
}

function openExportModal() { buildExportTable(); document.getElementById('exportModal').classList.add('open'); }
function closeExportModal() { document.getElementById('exportModal').classList.remove('open'); }

function buildExportTable() {
  var c=document.getElementById('exportTableContainer');
  if (!entries.length){c.innerHTML='<p style="text-align:center;padding:20px;color:var(--muted)">No entries yet.</p>';return;}
  var sorted=entries.slice().sort(function(a,b){return a.ts-b.ts;});
  var h='<table class="export-tbl"><thead><tr><th>#</th><th>Date</th><th>Time</th><th>A</th><th>B</th><th>C</th><th>Rating</th><th>D</th></tr></thead><tbody>';
  for (var i=0;i<sorted.length;i++) {
    var e=sorted[i];
    h+='<tr><td>'+(i+1)+'</td><td>'+fmtDate(e.date)+'</td><td>'+fmtTime(e.ts)+'</td><td>'+esc(e.a||'-')+'</td><td>'+esc(e.b||'-')+'</td><td>'+esc(e.c||'-')+'</td><td style="text-align:center">'+e.r+'/10</td><td>'+esc(e.d||'-')+'</td></tr>';
  }
  h+='</tbody></table>';
  c.innerHTML=h;
}

function downloadCSV() {
  if (!entries.length){toast('No entries');return;}
  var sorted=entries.slice().sort(function(a,b){return a.ts-b.ts;});
  var rows=['#,Date,Time,A - Situation,B - Thoughts,C - Emotions,Rating,D - Dispute'];
  for (var i=0;i<sorted.length;i++) {
    var e=sorted[i];
    rows.push([i+1,fmtDate(e.date),fmtTime(e.ts),
      '"'+(e.a||'').replace(/"/g,'""')+'"',
      '"'+(e.b||'').replace(/"/g,'""')+'"',
      '"'+(e.c||'').replace(/"/g,'""')+'"',
      e.r+'/10',
      '"'+(e.d||'').replace(/"/g,'""')+'"'
    ].join(','));
  }
  var blob=new Blob([rows.join('\r\n')],{type:'text/csv'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='therapy_journal.csv';a.click();
  URL.revokeObjectURL(url);
  toast('CSV downloaded!');
}

function copyTable() {
  if (!entries.length){toast('No entries');return;}
  var sorted=entries.slice().sort(function(a,b){return a.ts-b.ts;});
  var lines=['#\tDate\tTime\tA\tB\tC\tRating\tD'];
  for (var i=0;i<sorted.length;i++) {
    var e=sorted[i];
    lines.push([i+1,fmtDate(e.date),fmtTime(e.ts),e.a||'',e.b||'',e.c||'',e.r+'/10',e.d||''].join('\t'));
  }
  navigator.clipboard.writeText(lines.join('\n')).then(function(){toast('Copied!');}).catch(function(){toast('Copy failed');});
}

window.addEventListener('DOMContentLoaded', function() {
  var dateEl = document.getElementById('entryDate');
  dateEl.value = todayStr();
  document.getElementById('headerDate').textContent = fmtDate(todayStr());
  dateEl.addEventListener('change', renderSaved);
  addNewForm();
  renderSaved();
});
</script>
</body>
</html>
