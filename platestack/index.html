<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>PlateStack</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
  <style>
    *{touch-action:manipulation;}
    :root {
      --bg:#080809; --surface:#0f0f11; --surface-2:#161618; --surface-3:#1e1e22;
      --border:rgba(255,255,255,0.07); --border-hi:rgba(255,255,255,0.12);
      --text:#e8e8ea; --muted:#5a5a64; --faint:#2e2e34;
      --accent:#3b82f6; --accent-dim:rgba(59,130,246,0.12); --accent-h:#2563eb;
      --success:#22c55e; --error:#ef4444;
      --xs:clamp(0.71rem,0.68rem + 0.15vw,0.78rem);
      --sm:clamp(0.84rem,0.8rem + 0.2vw,0.93rem);
      --base:clamp(0.98rem,0.93rem + 0.25vw,1.08rem);
      --lg:clamp(1.12rem,1rem + 0.6vw,1.35rem);
      --s1:.25rem;--s2:.5rem;--s3:.75rem;--s4:1rem;--s5:1.25rem;--s6:1.5rem;--s8:2rem;
      --r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-xl:1rem;--r-2xl:1.25rem;--r-full:9999px;
      --ease:160ms cubic-bezier(0.16,1,0.3,1);
      --font:'Satoshi','Inter',system-ui,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-text-size-adjust:none;text-size-adjust:none;-webkit-font-smoothing:antialiased;}
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;font-size:var(--sm);overflow-x:hidden;}
    button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
    input{font:inherit;color:inherit;background:none;border:none;outline:none;}
    .app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;}

    /* HEADER */
    .header{padding:var(--s4) var(--s4) var(--s3);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:30;flex-shrink:0;}
    .logo{display:flex;align-items:center;gap:var(--s2);}
    .logo-text{font-size:var(--lg);font-weight:700;letter-spacing:-0.025em;}
    .logo-text em{font-style:normal;color:var(--accent);}
    .date-badge{font-size:var(--xs);color:var(--muted);font-weight:500;background:var(--surface);border:1px solid var(--border);padding:var(--s1) var(--s3);border-radius:var(--r-full);}

    /* BOTTOM NAV */
    .bottom-nav{display:flex;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0);}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:var(--s3) var(--s2) var(--s2);color:var(--muted);font-size:var(--xs);font-weight:600;transition:color var(--ease);min-height:56px;}
    .nav-btn.active{color:var(--accent);}
    .nav-btn svg{width:20px;height:20px;}

    /* MAIN */
    .main{flex:1;overflow-y:auto;overscroll-behavior:contain;padding:var(--s4);}
    .main::-webkit-scrollbar{width:3px;}
    .main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
    .view{display:none;}
    .view.active{display:block;}
    .section-label{font-size:var(--xs);font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--muted);margin-bottom:var(--s2);}
    .section-title{font-size:var(--base);font-weight:700;margin-bottom:var(--s4);}

    /* EXERCISE CHIPS */
    .ex-chips-wrap{overflow-x:auto;margin-bottom:var(--s3);-webkit-overflow-scrolling:touch;scrollbar-width:none;}
    .ex-chips-wrap::-webkit-scrollbar{display:none;}
    .ex-chips{display:flex;gap:var(--s2);width:max-content;padding:2px 1px;}
    .ex-chip{padding:var(--s2) var(--s3);background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-full);font-size:var(--sm);font-weight:600;color:var(--muted);white-space:nowrap;transition:all var(--ease);}
    .ex-chip.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent);}
    .ex-chip:active{transform:scale(0.95);}
    .ex-input-wrap{display:flex;align-items:center;gap:var(--s3);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--s3) var(--s4);margin-bottom:var(--s4);transition:border-color var(--ease);}
    .ex-input-wrap:focus-within{border-color:var(--accent);}
    .ex-input-wrap svg{color:var(--muted);flex-shrink:0;}
    .ex-input{flex:1;font-size:var(--base);font-weight:500;}
    .ex-input::placeholder{color:var(--muted);}

    /* BAR */
    .bar-row{display:flex;gap:var(--s2);margin-bottom:var(--s4);}
    .bar-chip{flex:1;padding:var(--s2);border:1.5px solid var(--border);border-radius:var(--r-full);font-size:var(--sm);font-weight:700;color:var(--muted);text-align:center;transition:all var(--ease);min-height:38px;}
    .bar-chip.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent);}
    .bar-chip:active{transform:scale(0.96);}

    /* WEIGHT CARD */
    .weight-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-2xl);padding:var(--s5) var(--s4) var(--s4);margin-bottom:var(--s4);text-align:center;}
    .weight-num{font-size:3.4rem;font-weight:700;letter-spacing:-0.04em;line-height:1;font-variant-numeric:tabular-nums;}
    .weight-unit{font-size:var(--base);font-weight:400;color:var(--muted);letter-spacing:0.08em;}
    .weight-break{font-size:var(--xs);color:var(--muted);margin-top:var(--s2);line-height:1.6;}
    .bb-wrap{display:flex;align-items:center;justify-content:center;height:64px;overflow:hidden;margin:var(--s3) 0;}
    .bb-collar{width:6px;height:18px;background:#777;border-radius:2px;flex-shrink:0;}
    .bb-shaft{height:7px;background:#555;flex:1;max-width:72px;min-width:16px;border-radius:2px;}
    .bb-plates-l{display:flex;flex-direction:row;align-items:center;gap:2px;}
    .bb-plates-r{display:flex;flex-direction:row;align-items:center;gap:2px;}
    .viz-p{border-radius:3px;flex-shrink:0;}
    .extra-lbl{font-size:9px;color:var(--muted);padding:0 3px;flex-shrink:0;}

    /* PLATE GRID */
    .picker-label{font-size:var(--xs);font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--muted);margin-bottom:var(--s3);}
    .plates-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:var(--s3) var(--s2);margin-bottom:var(--s3);align-items:start;}
    .plate-btn{display:flex;flex-direction:column;align-items:center;gap:var(--s2);padding:var(--s3) var(--s2);background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);cursor:pointer;transition:all var(--ease);position:relative;height:110px;justify-content:center;user-select:none;-webkit-user-select:none;overflow:visible;}
    .plate-btn:active{transform:scale(0.93);}
    .plate-btn.has-cnt{border-color:var(--accent);background:var(--accent-dim);}
    .plate-circle{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:rgba(0,0,0,0.65);line-height:1;flex-shrink:0;}
    .plate-cnt{position:absolute;top:-7px;right:-7px;min-width:20px;height:20px;padding:0 4px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;border-radius:var(--r-full);display:flex;align-items:center;justify-content:center;}

    /* BAR ACTIONS (remove / clear inside weight card) */
    .bar-actions{display:flex;gap:var(--s2);margin-top:var(--s3);padding-top:var(--s3);border-top:1px solid var(--border);}
    .rm-one{flex:1;padding:var(--s2) var(--s3);background:var(--surface-2);border:1px solid var(--border-hi);border-radius:var(--r-lg);font-size:var(--sm);font-weight:700;color:var(--text);text-align:center;transition:all var(--ease);}
    .rm-one:active{background:var(--surface-3);color:var(--text);}
    .rm-clear{flex:1;padding:var(--s2) var(--s3);background:transparent;border:1px solid var(--border-hi);border-radius:var(--r-lg);font-size:var(--sm);font-weight:700;color:var(--error);text-align:center;transition:all var(--ease);}
    .rm-clear:active{background:rgba(239,68,68,0.1);}
    /* REPS + LOG */
    .reps-row{display:flex;flex-direction:column;align-items:center;gap:var(--s2);margin-bottom:var(--s4);}
    .reps-label-big{font-size:var(--xs);font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.09em;}
    .reps-ctrl{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;}
    .reps-ctrl button{width:56px;height:56px;font-size:28px;font-weight:300;color:var(--muted);transition:all var(--ease);flex-shrink:0;}
    .reps-ctrl button:active{background:var(--surface-3);color:var(--text);}
    .reps-val{width:64px;text-align:center;font-size:var(--xl, 1.6rem);font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;}
    .log-btn{width:100%;padding:var(--s4);background:var(--accent);color:#fff;font-weight:700;font-size:var(--base);border-radius:var(--r-lg);text-align:center;min-height:54px;transition:all var(--ease);margin-bottom:var(--s5);}
    .log-btn:active{background:var(--accent-h);transform:scale(0.97);}

    /* SETS TABLE */
    .sets-section{display:none;}
    .sets-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--s3);}
    .finish-btn{padding:var(--s1) var(--s3);background:transparent;border:1.5px solid var(--success);color:var(--success);font-size:var(--xs);font-weight:700;border-radius:var(--r-full);transition:all var(--ease);}
    .finish-btn-bottom{width:100%;margin-top:var(--s5);padding:var(--s4);background:var(--accent);border:none;color:#fff;font-size:var(--sm);font-weight:700;border-radius:var(--r-lg);text-align:center;transition:all var(--ease);letter-spacing:0.03em;box-shadow:0 4px 14px rgba(59,130,246,0.35);}
    .finish-btn-bottom:active{background:rgba(34,197,94,0.1);}
    .finish-btn:active{background:rgba(34,197,94,0.1);}
    .sets-table{width:100%;border-collapse:collapse;}
    .sets-table thead th{font-size:var(--xs);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);padding:0 var(--s2) var(--s2) 0;text-align:left;border-bottom:1px solid var(--border);}
    .sets-table tbody tr{animation:fadeSlide 180ms ease-out both;}
    @keyframes fadeSlide{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
    .sets-table td{padding:var(--s3) var(--s2) var(--s3) 0;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums;vertical-align:middle;}
    .sets-table tbody tr:last-child td{border-bottom:none;}
    .td-num{color:var(--muted);font-weight:700;font-size:var(--sm);width:28px;}
    .td-weight{font-weight:700;font-size:var(--base);}
    .td-reps{color:var(--text);font-size:var(--sm);font-weight:600;}
    .td-del{width:28px;text-align:right;padding-right:0;}
    .del-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-md);color:var(--faint);transition:all var(--ease);}
    .pb-badge{display:inline-flex;align-items:center;gap:3px;padding:1px 7px 1px 5px;background:rgba(250,204,21,0.12);border:1px solid rgba(250,204,21,0.38);border-radius:var(--r-full);font-size:10px;font-weight:800;color:#facc15;letter-spacing:0.04em;margin-left:6px;vertical-align:middle;}
    .del-btn:active{background:rgba(239,68,68,0.12);color:var(--error);}

    /* HISTORY */
    .history-day{margin-bottom:var(--s6);}
    .history-date{font-size:var(--xs);font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--muted);padding-bottom:var(--s2);margin-bottom:var(--s2);border-bottom:1px solid var(--border);}
    .history-ex{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--s3) var(--s4);margin-bottom:var(--s2);}
    .history-ex-name{font-weight:700;font-size:var(--sm);margin-bottom:var(--s2);}
    .h-table{width:100%;border-collapse:collapse;}
    .h-table td{padding:2px 0;font-size:var(--xs);font-variant-numeric:tabular-nums;}
    .h-num{color:var(--muted);font-weight:700;width:22px;}
    .h-wt{font-weight:700;color:var(--text);white-space:nowrap;width:110px;}
    .h-reps{color:var(--muted);white-space:nowrap;}
    .history-summary{font-size:var(--xs);color:var(--accent);font-weight:600;margin-top:var(--s2);}

    /* PLATES VIEW */
    /* PLATES TAB REDESIGN */
    .plate-preview-bar{display:flex;align-items:center;gap:var(--s4);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-2xl);padding:var(--s4);margin-bottom:var(--s4);}
    .preview-info{display:flex;flex-direction:column;gap:4px;}
    .preview-weight{font-size:var(--lg);font-weight:700;color:var(--text);}
    .preview-meta{font-size:var(--xs);color:var(--muted);}
    .num-row{display:flex;align-items:center;gap:var(--s2);}
    .num-step{width:40px;height:40px;background:var(--surface-2);border:1px solid var(--border-hi);border-radius:var(--r-md);font-size:22px;font-weight:300;color:var(--text);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--ease);}
    .num-step:active{background:var(--surface-3);}
    .num-inp{flex:1;text-align:center;font-size:var(--base);font-weight:700;}
    .quick-weights{display:flex;flex-wrap:wrap;gap:var(--s2);margin-top:var(--s2);}
    .qw-chip{padding:var(--s1) var(--s3);background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-full);font-size:var(--xs);font-weight:700;color:var(--muted);transition:all var(--ease);}
    .qw-chip:active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}
    .plates-grid-label{font-size:var(--xs);font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--muted);margin-bottom:var(--s3);}
    .plates-edit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:var(--s3) var(--s2);margin-bottom:var(--s6);align-items:start;}
    .pedit-btn{display:flex;flex-direction:column;align-items:center;gap:var(--s2);padding:var(--s3) var(--s2);background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);cursor:pointer;transition:all var(--ease);position:relative;height:110px;justify-content:center;overflow:visible;}
    .pedit-btn:active{transform:scale(0.94);border-color:var(--accent);}
    .pedit-lbl{font-size:var(--xs);font-weight:600;color:var(--muted);}
    /* Edit modal */
    .edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:0 var(--s4) env(safe-area-inset-bottom,var(--s4));}
    .edit-modal{background:var(--surface-2);border:1px solid var(--border-hi);border-radius:var(--r-2xl) var(--r-2xl) var(--r-xl) var(--r-xl);padding:var(--s5) var(--s4) var(--s4);width:100%;max-width:430px;animation:slideUp 220ms cubic-bezier(0.16,1,0.3,1);}
    @keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
    .edit-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--s3);}
    .edit-title{font-size:var(--base);font-weight:700;}
    .edit-close{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--surface-3);color:var(--muted);font-size:14px;}
    .edit-del-btn{flex:1;padding:var(--s3);background:transparent;border:1.5px solid var(--accent);border-radius:var(--r-lg);color:var(--accent);font-weight:700;font-size:var(--sm);text-align:center;transition:all var(--ease);}
    .edit-del-btn:active{background:var(--error);color:#fff;}
    .edit-save-btn{flex:2;padding:var(--s3);background:var(--accent);border-radius:var(--r-lg);color:#fff;font-weight:700;font-size:var(--sm);text-align:center;transition:all var(--ease);}
    .edit-save-btn:active{background:var(--accent-h);}
    .plates-list-wrap{display:flex;flex-direction:column;gap:var(--s2);margin-bottom:var(--s6);}
    .plate-item{display:flex;align-items:center;gap:var(--s3);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--s3) var(--s4);}
    .p-swatch{width:34px;height:34px;border-radius:50%;flex-shrink:0;}
    .p-info{flex:1;}
    .p-weight{font-weight:700;font-size:var(--sm);}
    .p-sub{font-size:var(--xs);color:var(--muted);}
    .p-del{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-md);color:var(--muted);transition:all var(--ease);}
    .p-del:active{background:rgba(239,68,68,0.12);color:var(--error);}
    .divider{height:1px;background:var(--border);margin:var(--s6) 0;}
    .add-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-2xl);padding:var(--s4);}
    .size-chips{display:flex;gap:var(--s2);}
    .size-chip{flex:1;padding:var(--s2) var(--s3);background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--r-lg);font-size:var(--xs);font-weight:700;color:var(--muted);text-align:center;transition:all var(--ease);}
    .size-chip.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent);}
    .form-row{margin-bottom:var(--s4);}
    .form-lbl{font-size:var(--xs);font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--muted);display:block;margin-bottom:var(--s2);}
    .form-inp{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:var(--s3);font-size:var(--sm);color:var(--text);transition:border-color var(--ease);}
    .form-inp:focus{border-color:var(--accent);outline:none;}
    .swatches{display:grid;grid-template-columns:repeat(11,minmax(0,1fr));gap:5px;}
    .swatch{width:100%;aspect-ratio:1;border-radius:50%;cursor:pointer;border:2px solid transparent;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.12);transition:all var(--ease);}
    .swatch.sel{border-color:#fff;transform:scale(1.18);}
    .add-plate-btn{width:100%;padding:var(--s3);background:var(--accent);color:#fff;font-weight:700;font-size:var(--sm);border-radius:var(--r-lg);transition:all var(--ease);min-height:46px;}
    .add-plate-btn:active{background:var(--accent-h);}

    /* EMPTY */
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem var(--s8);text-align:center;color:var(--muted);gap:var(--s3);}
    .empty svg{color:var(--faint);}
    .empty h3{color:var(--text);font-size:var(--base);}
    .empty p{font-size:var(--sm);max-width:28ch;line-height:1.6;}

    /* TOAST */
    .toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--surface-3);border:1px solid var(--border-hi);color:var(--text);padding:var(--s2) var(--s5);border-radius:var(--r-full);font-size:var(--xs);font-weight:600;opacity:0;transition:all 200ms ease;pointer-events:none;z-index:99;white-space:nowrap;max-width:90vw;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  
    /* Rest Timer */
    .rest-btn{display:flex;align-items:center;justify-content:center;gap:var(--s2);width:100%;padding:var(--s3);background:var(--surface);border:1.5px solid var(--border-hi);border-radius:var(--r-lg);color:var(--muted);font-size:var(--sm);font-weight:600;margin-top:var(--s2);margin-bottom:var(--s5);transition:all var(--ease);}
    .rest-btn.active{border-color:var(--accent);color:var(--accent);}
    .rest-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:0 var(--s4) env(safe-area-inset-bottom,var(--s4));}
    .rest-modal{background:var(--surface-2);border:1px solid var(--border-hi);border-radius:var(--r-2xl) var(--r-2xl) var(--r-xl) var(--r-xl);padding:var(--s6) var(--s4) var(--s4);width:100%;max-width:430px;animation:slideUp 220ms cubic-bezier(0.16,1,0.3,1);display:flex;flex-direction:column;align-items:center;gap:var(--s4);}
    .rest-ring-wrap{position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center;}
    .rest-ring-svg{position:absolute;inset:0;width:100%;height:100%;}
    .rest-time-display{font-size:28px;font-weight:800;color:var(--text);letter-spacing:-0.02em;position:relative;z-index:1;}

    .h-pb-badge{display:inline-block;margin-left:5px;font-size:9px;font-weight:800;background:var(--accent);color:#fff;border-radius:3px;padding:1px 4px;vertical-align:middle;letter-spacing:0.05em;}

    .hes-inp{flex:1;text-align:center;padding:12px var(--s2);font-size:var(--lg);font-weight:700;border-radius:var(--r-md);}
    .hes-x{color:var(--muted);font-size:var(--base);flex-shrink:0;padding:0 2px;}
  
    /* History blocks */
    .h-ex-block{background:var(--surface);border-radius:var(--r-lg);padding:var(--s3);margin-bottom:var(--s3);cursor:pointer;transition:background var(--ease);}

    .history-ex-heading{font-size:var(--base);font-weight:800;color:var(--accent);letter-spacing:-0.01em;margin-bottom:var(--s3);}
    
      .h-del-session-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-md);color:var(--error);background:rgba(239,68,68,0.1);transition:all var(--ease);}

      .h-add-set-btn{width:100%;margin-top:var(--s2);padding:10px;border-radius:var(--r-md);background:var(--accent-dim);color:var(--accent);font-size:var(--sm);font-weight:700;text-align:center;}
      .hes-del-session-btn{width:100%;margin-top:var(--s3);padding:10px;border-radius:var(--r-lg);background:rgba(239,68,68,0.07);border:1.5px solid rgba(239,68,68,0.25);color:var(--error);font-size:var(--sm);font-weight:600;display:flex;align-items:center;justify-content:center;gap:var(--s2);}
    .hes-del-session-btn:active{background:rgba(239,68,68,0.18);}
      .h-icon-btn{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;background:var(--c2);border:1.5px solid var(--c3);border-radius:var(--r2);color:var(--muted);cursor:pointer;transition:border-color 0.15s,color 0.15s;}
      .h-icon-btn:hover{border-color:var(--accent);color:var(--accent);}

  </style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="logo">

          </button>

            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><polyline points="9 14 12 17 15 14"/></svg>
          </button>
          <button class="h-add-session-btn" onclick="openAddSession()">+ New Session</button>
        </div>
      </div>
      <div class="ex-input-wrap" style="margin-bottom:var(--s2);padding:var(--s2) var(--s3);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="opacity:0.45;flex-shrink:0;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="history-search" type="search" placeholder="Search exercise…" oninput="renderHistory()"

      <div style="margin-bottom:var(--s3);">
        <button id="pb-filter-btn" onclick="togglePBFilter()" style="display:inline-flex;align-items:center;gap:5px;background:rgba(250,204,21,0.10);border:1.5px solid rgba(250,204,21,0.38);border-radius:var(--r-full);color:#facc15;padding:5px 13px 5px 10px;font-size:0.82rem;font-weight:800;letter-spacing:0.04em;cursor:pointer;transition:background 0.15s,border-color 0.15s,color 0.15s;">
          <svg id="pb-filter-icon" width="11" height="11" viewBox="0 0 24 24" fill="#facc15" stroke="none"><path d="M2 20h20v2H2zM3 9l4 3 5-8 5 8 4-3-2 9H5z"/></svg>
          Filter PB Workouts
        </button>
      </div>
      <div id="history-content"></div>
    </section>

    <!-- PLATES -->

            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--s3);">
        <div class="plates-grid-label" style="margin-bottom:0;">My Plates — tap to edit</div>
        <button class="h-del-all-btn" onclick="deleteAllPlates()">Delete All</button>

      <div class="plates-edit-grid" id="plates-edit-grid"></div>

      <!-- Edit modal -->

            <span class="edit-title">Edit Plate</span>
            <button class="edit-close" onclick="closeEditModal()">&#10005;</button>
          </div>
          <div id="edit-preview-wrap" style="display:flex;justify-content:center;margin:var(--s4) 0;"></div>

            <label class="form-lbl" for="edit-wt">Weight (kg)</label>

          <div class="form-row">
            <span class="form-lbl">Colour</span>
            <div class="swatches" id="edit-swatches"></div>
          </div>
          <div class="form-row">
            <span class="form-lbl">Size</span>
            <div class="size-chips" id="edit-size-chips">
              <button class="size-chip" data-size="sm" onclick="selectEditSize('sm',this)">S</button>
              <button class="size-chip active" data-size="md" onclick="selectEditSize('md',this)">M</button>

            <button class="edit-save-btn" onclick="saveEditPlate()">Save Changes</button>

  </nav>
</div>

const COLORS=['#e0e0e0','#4ade80','#f87171','#facc15','#60a5fa','#c084fc','#f97316','#2dd4bf','#fb923c','#94a3b8','#f9a8d4','#a3e635'];

let S={
  barWeight:20, selected:{}, plateLog:[], reps:8, sets:[], history:[], activeEx:'', newColor:'#4ade80',

const STORAGE_KEY='platestack_v1';

function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      history: S.history,
      plates: S.plates,
      barWeight: S.barWeight,
      reps: S.reps
    }));
  }catch(e){}
}

function loadData(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const d=JSON.parse(raw);
    if(d.history) S.history=d.history;
    if(d.plates)  S.plates=d.plates;
    if(d.barWeight) S.barWeight=d.barWeight;
    if(typeof d.reps==='number') S.reps=d.reps;
  }catch(e){}
}

function exportData(){
  const json=JSON.stringify({history:S.history,plates:S.plates,barWeight:S.barWeight,reps:S.reps},null,2);
  const blob=new Blob([json],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='platestack-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}

function importData(){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='.json,application/json';
  inp.onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.history) S.history=d.history;
        if(d.plates)  S.plates=d.plates;
        if(d.barWeight) S.barWeight=d.barWeight;
        if(typeof d.reps==='number') S.reps=d.reps;
        saveData();
        refreshWorkout(); renderHistory(); renderPlatesGrid(); renderPlateEditGrid();
        showToast('Data imported!');
      }catch(ex){ showToast('Import failed'); }
    };
    reader.readAsText(file);
  };
  inp.click();
}



function totalW(){return S.barWeight+perSide()*2;}
function perSide(){
  return Object.entries(S.selected).reduce((s,[id,n])=>{
    const p=S.plates.find(x=>x.id===id);return s+(p?p.weight*n:0);},0);
}
function fmtW(w){
  if(w==null||isNaN(w))return '0.0';
  if(w===Math.floor(w))return w.toFixed(1);
  const s=w.toFixed(2);return s.endsWith('0')?s.slice(0,-1):s;
}

/* Barbell viz — properly mirrored */
function plateVizH(p){
  // Only 3 visual sizes on the barbell
  const s=p.size||'md';
  if(s==='sm') return 22;
  if(s==='lg') return 52;
  return 36; // md
}
function renderBBViz(){
  const viz=document.getElementById('bb-viz');
  // plates in tap order — first tapped nearest bar, last tapped outermost
  const plates=S.plateLog.map(id=>S.plates.find(p=>p.id===id)).filter(Boolean);
  if(!plates.length){
    // Show bare bar only if a bar weight is selected
    viz.innerHTML=S.barWeight>0?`
      <div class="bb-collar"></div>
      <div class="bb-shaft"></div>
      <div class="bb-collar"></div>`:'';
    return;
  }
  const MAX=7,show=plates.slice(0,MAX),extra=plates.length-MAX;
  const mkP=p=>{
    const c=p.color.replace('#','');
    const r2=parseInt(c.slice(0,2),16),g2=parseInt(c.slice(2,4),16),b2=parseInt(c.slice(4,6),16);
    const lum2=(0.299*r2+0.587*g2+0.114*b2)/255;
    const mx2=Math.max(r2,g2,b2),mn2=Math.min(r2,g2,b2),sat2=mx2===0?0:(mx2-mn2)/mx2;
    const outline=(lum2<0.18&&sat2<0.20)?'outline:1px solid rgba(255,255,255,0.25);outline-offset:-1px;':'';
    return `<div class="viz-p" style="width:10px;height:${plateVizH(p)}px;background:${p.color};${outline}"></div>`;
  };
  // Right: heaviest near bar → lightest outward: show order = [25,20,10] → place as-is
  let rHtml=show.map(mkP).join('');
  // Left: mirror — lightest near collar (left), heaviest near bar (right)
  // Reverse show so DOM order is light→heavy, flex-direction:row renders left→right ✓
  let lHtml=[...show].reverse().map(mkP).join('');
  if(extra>0){
    lHtml=`<span class="extra-lbl">+${extra}</span>`+lHtml;
    rHtml+=`<span class="extra-lbl">+${extra}</span>`;
  }
  viz.innerHTML=S.barWeight>0?`
    <div class="bb-collar"></div>
    <div class="bb-plates-l">${lHtml}</div>
    <div class="bb-shaft"></div>
    <div class="bb-plates-r">${rHtml}</div>
    <div class="bb-collar"></div>`:`
    <div class="bb-plates-l">${lHtml}</div>
    <div style="width:16px;height:5px;background:#444;border-radius:2px;flex-shrink:0;"></div>
    <div class="bb-plates-r">${rHtml}</div>`;
}

/* Plate grid */
function plateSz(w,size){
  if(size==='sm') return 44;
  if(size==='lg') return 82;
  return 62; // md
}
function plateTextColor(hex){
  // Convert hex to RGB and compute luminance
  const c=hex.replace('#','');
  const r=parseInt(c.substring(0,2),16);
  const g=parseInt(c.substring(2,4),16);
  const b=parseInt(c.substring(4,6),16);
  const lum=(0.299*r+0.587*g+0.114*b)/255;
  return lum>0.45?'rgba(0,0,0,0.75)':'rgba(255,255,255,0.9)';
}
function plateKgColor(hex){
  const c=hex.replace('#','');
  const r=parseInt(c.substring(0,2),16);
  const g=parseInt(c.substring(2,4),16);
  const b=parseInt(c.substring(4,6),16);
  const lum=(0.299*r+0.587*g+0.114*b)/255;
  return lum>0.45?'rgba(0,0,0,0.5)':'rgba(255,255,255,0.6)';
}
function plateBorder(hex){
  const c=hex.replace('#','');
  const r=parseInt(c.substring(0,2),16),g=parseInt(c.substring(2,4),16),b=parseInt(c.substring(4,6),16);
  const lum=(0.299*r+0.587*g+0.114*b)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),sat=mx===0?0:(mx-mn)/mx;
  if(lum<0.18 && sat<0.20) return '1.5px solid rgba(255,255,255,0.25)';
  return '1.5px solid transparent';
}

function renderPlatesGrid(){
  const grid=document.getElementById('plates-grid');grid.innerHTML='';
  [...S.plates].sort((a,b)=>{const so={sm:0,md:1,lg:2};const sd=(so[a.size||'md']||0)-(so[b.size||'md']||0);return sd!==0?sd:a.weight-b.weight;}).forEach(p=>{
    const cnt=S.selected[p.id]||0;
    const sz=plateSz(p.weight,p.size||'md');
    const numFs=sz<48?'11px':sz<64?'14px':sz<78?'16px':'18px';
    const kgFs =sz<48?'9px':sz<64?'10.5px':sz<78?'11.5px':'13px';
    const btn=document.createElement('button');
    btn.className='plate-btn'+(cnt>0?' has-cnt':'');
    btn.setAttribute('aria-label',`Add ${p.weight}kg plate`);
    btn.innerHTML=`
      <div style="width:${sz}px;height:${sz}px;background:${p.color};border-radius:50%;border:${plateBorder(p.color)};box-sizing:border-box;
           display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;">
        <span style="font-weight:800;font-size:${numFs};color:${plateTextColor(p.color)};line-height:1.15;">${p.weight}</span>
        <span style="font-weight:700;font-size:${kgFs};color:${plateKgColor(p.color)};line-height:1;">kg</span>

    grid.appendChild(btn);

function logSet(){

function getHistoryBest(exercise){
  // returns {weight, reps} of best set ever — higher weight wins; same weight → higher reps wins
  let best={weight:0,reps:0};
  S.history.forEach(day=>{
    day.exercises.forEach(ex=>{
      if(ex.name===exercise) ex.sets.forEach(s=>{
        if(s.weight>best.weight||(s.weight===best.weight&&s.reps>best.reps))
          best={weight:s.weight,reps:s.reps};
      });
    });
  });
  return best;
}
function isBetter(a,b){
  // a beats b if higher weight, or same weight with more reps
  return a.weight>b.weight||(a.weight===b.weight&&a.reps>b.reps);
}

    const histBest=getHistoryBest(set.exercise);

/* History */
function getAllTimeBest(exName, excludeSi){
  let best={weight:0,reps:0};
  S.history.forEach((sess,si)=>{
    if(si===excludeSi) return;
    sess.exercises.forEach(ex=>{
      if(ex.name===exName) ex.sets.forEach(s=>{
        if(isBetter(s,best)) best=s;
      });
    });
  });
  return best;
}

let pbFilterActive=false;
function togglePBFilter(){
  pbFilterActive=!pbFilterActive;
  const btn=document.getElementById('pb-filter-btn');
  if(btn){
    btn.style.background=pbFilterActive?'#facc15':'rgba(250,204,21,0.10)';
    btn.style.borderColor='#facc15';
    btn.style.color=pbFilterActive?'#000':'#facc15';

    btn.style.transform=pbFilterActive?'scale(1.03)':'scale(1)';

    if(icon)icon.style.fill=pbFilterActive?'#000':'#facc15';

function sessionHasPB(session,si){
  return session.exercises.some(ex=>{
    const histB=getAllTimeBest(ex.name,si);
    return ex.sets.some(s=>isBetter(s,histB)||(s.weight===histB.weight&&s.reps===histB.reps&&histB.weight>0));
  });
}
function renderHistory(){
  const el=document.getElementById('history-content');
  const rawQ=(document.getElementById('history-search')||{}).value||'';
  const q=rawQ.trim().toLowerCase();
  if(!S.history.length){
    el.innerHTML=`<div class="empty">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/>
      </svg><h3>No workouts yet</h3><p>Log your first set and tap "Finish &amp; Save".</p></div>`;
    return;
  }
  el.innerHTML='';
  const sorted=[...S.history].map((session,si)=>({session,si})).sort((a,b)=>{
    const toMs=s=>{
      const d=new Date(s.session.date||0).getTime()||0;
      const t=s.session.time||'';
      const m=t.match(/(\d+):(\d+)\s*(AM|PM)?/i);
      if(!m)return d;
      let hh=parseInt(m[1]),mm=parseInt(m[2]);
      if(m[3]){const pm=m[3].toUpperCase()==='PM';if(pm&&hh!==12)hh+=12;if(!pm&&hh===12)hh=0;}
      return d+(hh*3600+mm*60)*1000;
    };
    return toMs(b)-toMs(a);
  });
  const filtered=sorted.filter(({session,si})=>{
    const matchesQ=!q||(
      session.exercises.some(ex=>ex.name.toLowerCase().includes(q))||
      (session.note&&session.note.toLowerCase().includes(q))||
      (session.date&&session.date.toLowerCase().includes(q))
    );
    const matchesPB=!pbFilterActive||sessionHasPB(session,si);
    return matchesQ&&matchesPB;
  });
  if(!filtered.length){
    el.innerHTML=`<div class="empty"><p>No workouts match "<strong>${rawQ}</strong>".</p></div>`;
    return;
  }
  filtered.forEach(({session,si})=>{
    try{
    const div=document.createElement('div');div.className='history-day';
    const st=session.time?' · '+session.time:'';
    const exHtml=session.exercises.map((ex,ei)=>{
      let sessB={weight:0,reps:0};
      ex.sets.forEach(s=>{if(isBetter(s,sessB))sessB=s;});
      const histB=getAllTimeBest(ex.name,si);
      const rows=ex.sets.map((s,i)=>{
        const isSessTop=s.weight===sessB.weight&&s.reps===sessB.reps;
        const isPBRow=isSessTop&&(isBetter(s,histB)||(s.weight===histB.weight&&s.reps===histB.reps));
        const wtStyle=isSessTop?'color:var(--accent);font-weight:800;':'';
        const pbBadge=isPBRow?`<span class="pb-badge"><svg width="10" height="10" viewBox="0 0 24 24" fill="#facc15" stroke="none"><path d="M2 20h20v2H2zM3 9l4 3 5-8 5 8 4-3-2 9H5z"/></svg>PB</span>`:'';
        return `<tr>
          <td class="h-num">${i+1}</td>
          <td class="h-wt"><span style="${wtStyle}">${fmtW(s.weight??0)} kg</span>${pbBadge}</td>
          <td class="h-reps">× ${s.reps??'—'}</td>
        </tr>`;
      }).join('');
      return `<div class="history-ex h-ex-block" onclick="openEditSession(${si})">
          <div class="history-ex-heading">${(()=>{if(!q||!ex.name.toLowerCase().includes(q))return ex.name;const re=new RegExp(rawQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');return ex.name.replace(re,m=>'<mark style="background:var(--accent);color:#000;border-radius:3px;padding:0 2px;">'+m+'</mark>');})()}</div>
          <table class="h-table"><tbody>${rows}</tbody></table>
        </div>`;
    }).join('');
    const exHtmlStr=typeof exHtml==='string'?exHtml:exHtml.join('');
    div.innerHTML=`
      <div class="history-date-row">
        <span class="history-date">${fmtDate(session.date)+st}</span>
      </div>
      ${exHtmlStr||'<div style="color:var(--muted);font-size:var(--sm);padding:var(--s2) 0;">No exercises logged.</div>'}`;
    el.appendChild(div);
    }catch(e){console.warn('renderHistory session error',si,e);}
  });

function saveEditSession(){
  // Rebuild exercises from DOM rows grouped by ei
  const sess=S.history[_editSi];
  // Collect all inputs grouped by ei
  const exMap={};
  document.querySelectorAll('.hes-inp').forEach(inp=>{
    const {ei,seti,field}=inp.dataset;
    if(!exMap[ei]) exMap[ei]={};
    if(!exMap[ei][seti]) exMap[ei][seti]={};
    const val=field==='weight'?parseFloat(inp.value):parseInt(inp.value);
    if(!isNaN(val)&&val>=0) exMap[ei][seti][field]=val;
  });
  // Save exercise names
  document.querySelectorAll('.hes-ex-name-inp').forEach(inp=>{

    if(sets.length) sess.exercises[ei].sets=sets;
  });
  const di=document.getElementById('hes-date-inp');
  if(di&&di.value){

    const slum=(0.299*sr+0.587*sg+0.114*sb2)/255;
    const smx=Math.max(sr,sg,sb2),smn=Math.min(sr,sg,sb2),ssat=smx===0?0:(smx-smn)/smx;

  restTotal=secs;restRemaining=secs;
  document.querySelectorAll('.rest-preset').forEach(b=>b.classList.toggle('active',parseInt(b.onclick.toString().match(/\d+/))==secs));
  document.getElementById('rest-play-btn').textContent='Start';
  updateRestDisplay();
}
function startRestTimer(){
  if(restRemaining<=0)restRemaining=restTotal;
  restRunning=true;
  document.getElementById('rest-play-btn').textContent='Pause';
  document.getElementById('rest-btn').classList.add('active');
  restInterval=setInterval(()=>{
    restRemaining--;
    updateRestDisplay();
    if(restRemaining<=0){
      clearInterval(restInterval);restRunning=false;
      document.getElementById('rest-play-btn').textContent='Start';
      document.getElementById('rest-btn').classList.remove('active');
      document.getElementById('rest-btn-label').textContent='Rest Timer';
      // vibrate if supported
      if(navigator.vibrate) navigator.vibrate([200,100,200]);
    } else {
      const m=Math.floor(restRemaining/60),s=restRemaining%60;
      document.getElementById('rest-btn-label').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    }
  },1000);
}
function playPauseRest(){
  if(restRunning){clearInterval(restInterval);restRunning=false;document.getElementById('rest-play-btn').textContent='Resume';}
  else startRestTimer();
}
function resetRestTimer(){
  clearInterval(restInterval);restRunning=false;
  restRemaining=restTotal;
  document.getElementById('rest-play-btn').textContent='Start';
  document.getElementById('rest-btn').classList.remove('active');
  document.getElementById('rest-btn-label').textContent='Rest Timer';
  updateRestDisplay();
}
function updateRestDisplay(){
  const m=Math.floor(restRemaining/60),s=restRemaining%60;
  document.getElementById('rest-time-display').textContent=`${m}:${s.toString().padStart(2,'0')}`;
  const circ=326.7;
  const offset=circ*(1-restRemaining/restTotal);
  document.getElementById('rest-ring').style.strokeDashoffset=offset;
}

</script>
</body>
</html>
